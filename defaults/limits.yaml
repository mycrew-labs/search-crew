# Search Crew · 各 subagent 上限（用户态 active）
#
# 这些是硬上限的兜底值，避免 deep-search 无限循环 / evidence-search 抓太多。
# 想加大 / 减小可以直接改。

last_updated: "2026-05-21"

fast_search:
  max_results: 5         # 每次抓多少个搜索结果
  fetch_timeout_sec: 30  # 单次 fetch 超时
  # fetch.py 多 URL 并发抓取的 worker 数。默认 5。
  # Jina Reader（r.jina.ai）速率：免费 key 500 RPM（≈8 req/s），并非主要瓶颈。
  # 官方 FAQ 另有一句 platform-wide「Free 2 concurrent」，但口径笼统、未明确卡 Reader；
  # 社区工具（jina-light-mcp 等）默认并发 5 跑得动，故这里取 5。
  # 若频繁吃 429 可调低；Paid（50 concurrent）/ Premium（500）可调高。
  fetch_concurrency: 5

site_search:
  max_results: 10
  fetch_timeout_sec: 60
  browser_step_timeout_sec: 60   # 浏览器单次操作硬上限

deep_search:
  max_rounds: 5          # 跨轮硬上限（OPEN-AGENT-002-A 方案 C）
  per_round_breadth: 4   # 每轮上限：每轮最多并行派几个 subagent（lead 按复杂度选 ≤ 它，简单题别铺满）

wide_search:
  # 每次最多并行派几个 worker（= 对照矩阵最多几个对象）。超过则 lead 分批或请用户收窄。
  # 上限存在的理由：worker 是 Claude subagent（非 Manus 那种独立 VM），成本 ~15×，
  # 一次铺太多既爆 token 又可能撞 Task 并发上限。
  max_items: 12

# 同 run 同 backend 的调用次数上限（防 subagent 反复追打同一源）
# - 触发上限时 lib/_http.py 直接 raise BackendError(reason="call_cap_exceeded")，不真正发请求
# - HTTP 429 / 5xx 在调用方主动重发时才增计数；request_json 内部不 retry
# - 跨 run（不同 SEARCH_CREW_RUN_ID / session_id / PID）计数独立
call_cap:
  ai_backend: 1          # grok / doubao / gemini 同 run 上限
  non_ai_backend: 2      # jina / serper / 站点 adapter / chrome-devtools-mcp 等同 run 上限
  # 注：读取/抓取操作（jina-reader、fetch.py 直连）豁免本上限，上限只管搜索源

# web-page-fetch 抓取被挡（反爬墙 / 登录墙 / 付费墙）时怎么办：
# - honest（默认）：诚实说明被挡、未取到正文，不打断流程
# - collaborate：诚实说明 + 主动给用户协作路径（浏览器打开贴正文 / 本地文件路径 / 提供 cookies）
#   适合你常读需登录/付费内容、愿意配合的场景
# 未来 B-006 远程 browser-host 就绪后，needs_auth 会先自动走远程，仍拿不到才落到本策略。
web_page_fetch:
  on_blocked: honest

  # 进阶（可选，默认关）：远程 browser-host —— fetch.py 抓取链的中间层
  # （jina-reader → **opencli-remote(本段)** → Claude WebFetch）。遇 jina 失败 / 反爬 /
  # needs_auth 时，若本段 enabled，会 GET `<endpoint>?url=<目标>`（带 basic auth）用真实
  # 登录态浏览器抓取。**客户端已接好**（enabled+endpoint 即生效）；服务端需你在一台带桌面
  # 的 Linux 上跑 opencli-browser-host（backlog B-006）+ frp 暴露，再填端点和 basic auth。
  # 默认 enabled:false → 该层跳过，行为同纯 jina→WebFetch。
  remote_host:
    enabled: false
    endpoint: ""              # 如 https://browser-host.yourdomain.com/fetch
    auth_user: ""             # frp HTTP 代理 basic auth 用户名
    auth_pass: ""             # frp HTTP 代理 basic auth 密码（建议从环境变量注入，别硬写）
